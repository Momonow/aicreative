<!doctype html>
<html lang="en" data-resolution="portrait">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=1080, height=1920"/>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
@font-face{font-family:"Montserrat Black";src:url("assets/fonts/Montserrat-Black.ttf") format("truetype");font-weight:900;font-display:block;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1920px;overflow:hidden;background:#000;}
#root{position:relative;width:1080px;height:1920px;overflow:hidden;}
#bg{position:absolute;inset:0;background:url("assets/selfie3.png") center center/cover no-repeat;transform-origin:38% 20%;}
#title{position:absolute;top:0;left:0;width:1080px;text-align:center;padding:44px 0 30px;background:rgba(0,0,0,.42);font-family:"Montserrat Black",sans-serif;font-size:140px;color:#fff;-webkit-text-stroke:5px #000;letter-spacing:1px;line-height:1;z-index:3;}
#pip{position:absolute;left:90px;bottom:0;width:900px;height:850px;object-fit:cover;object-position:50% 12%;transform-origin:bottom center;z-index:2;}
</style></head>
<body>
<div id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="1080" data-height="1920">
<div id="bg"></div>
<video id="pip" class="clip" src="assets/matte.webm" data-start="0" data-duration="10" data-track-index="1" muted playsinline></video>
<div id="title" class="clip" data-start="0" data-duration="10" data-track-index="2">MENINGIOMA</div>
<audio id="pip-audio" src="assets/matte.webm" data-start="0" data-duration="10" data-track-index="10" data-volume="1"></audio>
</div>
<script>
window.__timelines=window.__timelines||{};
const tl=gsap.timeline({paused:true});
tl.from("#title",{scale:1.6,opacity:0,duration:.4,ease:"power3.out"},.15);
gsap.set("#pip",{x:-160,scale:0.97});
tl.to("#pip",{x:160,duration:9.6,ease:"sine.inOut"},0.2);
tl.to("#pip",{scale:1.12,duration:4.8,ease:"sine.inOut",yoyo:true,repeat:1},0.2);
tl.fromTo("#bg",{scale:1.26},{scale:1.02,duration:9.8,ease:"sine.out"},0);
window.__timelines["main"]=tl;
</script></body></html>
